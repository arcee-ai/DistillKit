model: "HuggingFaceTB/SmolLM2-135M"

teacher:
  kind: vllm
  base_url: "http://localhost:8000"
  model: HuggingFaceTB/SmolLM2-1.7B
  top_k: 256
  timeout: 120.0
  max_retries: 3
  # api_key: "optional-key"  # Uncomment if your vLLM server requires authentication
  # api_key: ${MY_VLLM_API_KEY}  # Also can use env vars

dataset:
  train_dataset:
    repo_id: "HuggingFaceTB/smollm-corpus"
    split: "train[:1000]"
  seed: 42

sequence_length: 2048
output_path: "./output/smollm2-vllm-distill"

loss_functions:
  - function: kl
    weight: 1.0
    temperature: 2.0
    missing_probability_handling: zero
    sparse_chunk_length: 512

training_args:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 100
  evaluation_strategy: "no"
